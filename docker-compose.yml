version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "5959:443"
      - "5969:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - whisper-web
      - whisper-api
      - parser-web
      - parser-api
      - ai-researcher
    networks:
      - ai-network


